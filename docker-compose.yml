services:
  postgres:
    image: postgres:16
    container_name: urban-service-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-urban_service}
      POSTGRES_USER: ${POSTGRES_USER:-urban_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urban_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - urban_service_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/import_clean_311_docker.sql:/docker-entrypoint-initdb.d/02_import_clean_311.sql:ro
      - ./data-pipeline/processed/clean_311.csv:/docker-entrypoint-initdb.d/clean_311.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  urban_service_postgres_data:
