services:
  postgres:
    image: postgres:16
    container_name: urban-service-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-urban_service}
      POSTGRES_USER: ${POSTGRES_USER:-urban_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urban_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - urban_service_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/import_clean_311_docker.sql:/docker-entrypoint-initdb.d/02_import_clean_311.sql:ro
      - ./data-pipeline/processed/clean_311.csv:/docker-entrypoint-initdb.d/clean_311.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: urban-service-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-urban_service}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-urban_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-urban_password}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: urban-service-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  urban_service_postgres_data:
